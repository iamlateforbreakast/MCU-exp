services:
  rtems-dev:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: rtems-dev
    userns_mode: "keep-id"
    user: thomas
    volumes:
      # Persists the workspace
      - /home/thomas/Projects/MCU-exp/workspace:/home/thomas/workspace:z,U
      
    # Keeps the container running so you can exec into it
    stdin_open: true
    tty: true
